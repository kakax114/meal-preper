<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recipe Collector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      width: 380px;
      min-height: 200px;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .badge {
      background: #e85c00;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      min-width: 28px;
      text-align: center;
    }

    .url-list {
      max-height: 280px;
      overflow-y: auto;
      background: #111;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 14px;
      font-size: 11px;
      line-height: 1.6;
    }

    .url-list:empty::after {
      content: 'Browse HelloFresh — recipe URLs will appear here automatically.';
      color: #666;
      font-style: italic;
      display: block;
      padding: 8px 4px;
    }

    .url-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 4px;
      border-radius: 4px;
      word-break: break-all;
    }

    .url-item:hover { background: #1e1e1e; }

    .url-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }

    .url-item a {
      color: #7bc8ff;
      text-decoration: none;
    }

    .url-item a:hover { text-decoration: underline; }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    #btn-export {
      background: #e85c00;
      color: #fff;
    }

    #btn-clear {
      background: #333;
      color: #ccc;
    }

    .status {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 10px;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Recipe URL Collector</h1>
    <span class="badge" id="count">0</span>
  </header>

  <div class="url-list" id="url-list"></div>

  <div class="actions">
    <button id="btn-export">Export as .txt</button>
    <button id="btn-clear">Clear All</button>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
