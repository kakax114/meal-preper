<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cookbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ── Themes ─────────────────────────────────────────────────── */
html[data-theme="dark"] {
  --bg: #111113;
  --card: #1C1C1E;
  --card2: #2C2C2E;
  --text: #F4F4F5;
  --text2: #A1A1AA;
  --text3: #52525B;
  --border: rgba(255,255,255,.08);
  --green-bg: #0D2818;
  --green-light: #14532D;
  --nav-bg: rgba(22,22,24,.45);
  --nav-border: rgba(255,255,255,.14);
}
html[data-theme="light"] {
  --bg: #F6F6F4;
  --card: #ffffff;
  --card2: #F0F0EE;
  --text: #18181B;
  --text2: #52525B;
  --text3: #A1A1AA;
  --border: rgba(0,0,0,.08);
  --green-bg: #F0FAF3;
  --green-light: #D8F3DC;
  --nav-bg: rgba(248,248,246,.45);
  --nav-border: rgba(0,0,0,.1);
}
:root {
  --green: #2D6A4F;
  --green-dark: #1B4332;
  --green-mid: #52B788;
  --red: #DC2626;
  --r20: 20px; --r14: 14px; --r10: 10px;
  --shadow: 0 1px 8px rgba(0,0,0,.1), 0 4px 20px rgba(0,0,0,.12);
  --shadow-sm: 0 1px 4px rgba(0,0,0,.08);
}

/* ── Reset ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); overscroll-behavior: none; }
body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }
button { font-family: 'DM Sans', sans-serif; cursor: pointer; }
img { display: block; }

/* ── App shell ──────────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg); }

/* ── Topbar ─────────────────────────────────────────────────── */
.topbar-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(14px + env(safe-area-inset-top)) 16px 0;
}
.topbar-left { display: flex; align-items: baseline; gap: 7px; }
.app-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
#count-pill { font-size: 12px; color: var(--text3); font-weight: 400; }
.topbar-right { display: flex; align-items: center; gap: 8px; }

/* Segmented control */
.seg-group { display: flex; background: var(--bg); border: 0.5px solid var(--border); border-radius: 20px; overflow: hidden; height: 34px; }
.seg-btn { padding: 0 13px; background: none; border: none; border-right: 0.5px solid var(--border); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background .15s, color .15s; white-space: nowrap; }
.seg-btn:last-child { border-right: none; }
.seg-btn:active { background: var(--card2); }
.seg-btn.on { background: var(--green-bg); color: var(--green-mid); }
.seg-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* Search icon btn */
.icon-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--bg); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; transition: background .15s; }
.icon-btn:active { background: var(--card2); }
.icon-btn svg { width: 16px; height: 16px; stroke: var(--text2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Bottom nav ──────────────────────────────────────────────── */
#bottom-nav {
  position: fixed;
  bottom: calc(14px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px;
  background: var(--nav-bg);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 0.5px solid var(--nav-border);
  border-radius: 9999px;
  padding: 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,.22), 0 2px 8px rgba(0,0,0,.12);
  z-index: 50;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 22px; border: none; background: none; border-radius: 9999px;
  color: var(--text3); font-size: 10px; font-weight: 600; cursor: pointer;
  transition: all .18s; letter-spacing: .01em; white-space: nowrap;
}
.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn.active { background: var(--green); color: #fff; }
.nav-btn.active svg { stroke: #fff; }

/* ── Search bar ─────────────────────────────────────────────── */
.search-bar { background: var(--card); padding: 10px 16px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; display: none; }
.search-inner { position: relative; }
.search-inner svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
.search-input { width: 100%; padding: 9px 32px 9px 34px; border-radius: var(--r10); border: 0.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; }
.search-input:focus { border-color: var(--green); }
.search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); font-size: 14px; display: none; }

/* Filter pills */
.filter-row { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; background: var(--card); border-bottom: 0.5px solid var(--border); }
.filter-row::-webkit-scrollbar { display: none; }
.fpill { font-size: 12px; font-weight: 500; padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border); white-space: nowrap; color: var(--text2); background: var(--card); transition: all .15s; flex-shrink: 0; }
.fpill.active { background: var(--green); color: #fff; border-color: var(--green); }

/* ── Screens ─────────────────────────────────────────────────── */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* Detail overlay */
#detail-screen {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg); display: none;
  flex-direction: column;
}
#detail-screen.active { display: flex; }

/* ── Recipes screen header ─────────────────────────────────── */
#recipes-header { flex-shrink: 0; background: var(--card); border-bottom: 0.5px solid var(--border); padding-bottom: 10px; }

/* ── Swipe area ─────────────────────────────────────────────── */
.swipe-area { flex: 1; padding: 14px 14px calc(80px + env(safe-area-inset-bottom)) 14px; position: relative; overflow: hidden; }
.card-stack { position: relative; height: 100%; }

/* ── Recipe card ─────────────────────────────────────────────── */
.recipe-card {
  position: absolute; inset: 0; border-radius: var(--r20); background: var(--card);
  overflow: hidden; cursor: grab; user-select: none; box-shadow: var(--shadow); will-change: transform;
}
.recipe-card:active { cursor: grabbing; }
.card-back-1 { transform: translateY(10px) scale(.97); opacity: .72; pointer-events: none; z-index: 2; }
.card-back-2 { transform: translateY(18px) scale(.94); opacity: .44; pointer-events: none; z-index: 1; }
.card-top { z-index: 3; }

.card-hero { height: 52%; position: relative; overflow: hidden; background: var(--card2); }
.card-hero img { width: 100%; height: 100%; object-fit: cover; }
.card-hero-fade { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.5) 100%); }
.card-badges { position: absolute; bottom: 10px; left: 12px; right: 12px; display: flex; align-items: center; justify-content: space-between; }
.badge-cuisine { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,.55); color: #fff; backdrop-filter: blur(4px); letter-spacing: .03em; }
.card-save-btn { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.88); border: none; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); }
.card-save-btn svg { width: 15px; height: 15px; stroke: var(--text2); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: all .15s; }
.card-save-btn.saved svg { stroke: var(--red); fill: var(--red); }

.sov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; border-radius: var(--r20); opacity: 0; }
.sov-save { outline: 3px solid var(--green-mid); outline-offset: -3px; }
.sov-skip  { outline: 3px solid var(--red); outline-offset: -3px; }
.sov-label { font-size: 15px; font-weight: 700; letter-spacing: .06em; padding: 8px 18px; border-radius: 8px; text-transform: uppercase; }
.sov-save .sov-label { background: var(--green); color: #fff; }
.sov-skip .sov-label  { background: var(--red);   color: #fff; }

.card-body { padding: 12px 14px; display: flex; flex-direction: column; height: 48%; overflow: hidden; }
.card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.2; margin-bottom: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-headline { font-size: 12px; color: var(--text2); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
.card-quick { display: flex; gap: 14px; margin-bottom: 8px; }
.qitem { font-size: 11px; color: var(--text2); }
.qitem strong { display: block; font-size: 13px; font-weight: 600; color: var(--text); }
.ing-strip { display: flex; gap: 6px; align-items: center; flex: 1; overflow: hidden; min-height: 0; margin-bottom: 8px; }
.ing-strip-more { font-size: 11px; color: var(--text3); font-weight: 500; white-space: nowrap; }
.card-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn { flex: 1; padding: 10px 0; border-radius: var(--r10); border: none; font-size: 13px; font-weight: 600; transition: opacity .15s; }
.btn:active { opacity: .8; }
.btn-skip { background: var(--card2); color: var(--text2); border: 0.5px solid var(--border); }
.btn-view { background: var(--green); color: #fff; }

.swipe-hint { text-align: center; font-size: 11px; color: var(--text3); padding: 5px 0 3px; flex-shrink: 0; }

/* ── Empty / loading states ──────────────────────────────────── */
.center-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 40px 24px; text-align: center; flex: 1; height: 100%; }
.state-title { font-size: 16px; font-weight: 600; color: var(--text); }
.state-sub { font-size: 13px; color: var(--text2); line-height: 1.55; }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Detail ─────────────────────────────────────────────────── */
.detail-hero { height: 250px; flex-shrink: 0; position: relative; overflow: hidden; background: var(--card2); }
.detail-hero img { width: 100%; height: 100%; object-fit: cover; }
.detail-hero-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 100px; background: linear-gradient(transparent, var(--bg)); }
.detail-back, .detail-fav {
  position: absolute; top: calc(14px + env(safe-area-inset-top));
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(0,0,0,.45); border: none;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px); z-index: 2;
}
.detail-back { left: 14px; }
.detail-fav  { right: 14px; }
.detail-back svg, .detail-fav svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: all .15s; }
.detail-fav.saved svg { stroke: #fca5a5; fill: var(--red); }

.detail-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px calc(90px + env(safe-area-inset-bottom)); }
.detail-title { font-family: 'Playfair Display', serif; font-size: 23px; font-weight: 700; line-height: 1.2; margin-bottom: 3px; }
.detail-headline { font-size: 14px; color: var(--text2); margin-bottom: 12px; font-style: italic; }
.detail-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 18px; }
.allergen-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
.allergen-chip { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: rgba(220,150,38,.12); color: #fbbf24; border: 0.5px solid rgba(220,150,38,.25); }
.detail-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.detail-pill { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: var(--card2); border: 0.5px solid var(--border); color: var(--text2); }
.detail-pill.green { background: var(--green-bg); color: var(--green-mid); border-color: var(--green-light); }

.detail-actions { display: flex; gap: 8px; margin-bottom: 14px; }
.d-btn { flex: 1; padding: 12px 0; border-radius: var(--r10); border: none; font-size: 13px; font-weight: 600; transition: opacity .15s; }
.d-btn:active { opacity: .8; }
.d-btn-week { background: var(--green); color: #fff; }
.d-btn-week.in-week { background: var(--green-bg); color: var(--green-mid); border: 0.5px solid var(--green-light); }

.yt-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border-radius: var(--r10); background: rgba(220,38,38,.12); color: #fca5a5; font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 20px; border: 0.5px solid rgba(220,38,38,.2); }
.yt-btn svg { width: 17px; height: 17px; flex-shrink: 0; }

.sec-hd { font-size: 10px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--text3); margin: 0 0 10px; }

/* Nutrition */
.nutrition-row { display: flex; gap: 8px; margin-bottom: 22px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.nutrition-row::-webkit-scrollbar { display: none; }
.nutr-chip { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--r10); padding: 8px 12px; flex-shrink: 0; text-align: center; min-width: 70px; }
.nutr-val { font-size: 16px; font-weight: 600; color: var(--text); }
.nutr-name { font-size: 10px; color: var(--text3); margin-top: 1px; }

/* Ingredients */
.ing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 22px; }
.ing-card { background: var(--card); border-radius: var(--r14); border: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 10px 8px 9px; }
.ing-card img { width: 52px; height: 52px; object-fit: contain; margin-bottom: 6px; background: var(--card2); border-radius: 8px; }
.ing-card-name { font-size: 11px; font-weight: 500; text-align: center; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.ing-card-qty { font-size: 10px; color: var(--text2); margin-top: 2px; text-align: center; }

/* Steps */
.steps-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
.step-card { background: var(--card); border-radius: var(--r14); border: 0.5px solid var(--border); overflow: hidden; }
.step-img { width: 100%; height: 180px; overflow: hidden; position: relative; background: var(--card2); display: flex; align-items: center; justify-content: center; }
.step-img img { width: 100%; height: 100%; object-fit: cover; }
.step-img-overlay { position: absolute; inset: 0; background: linear-gradient(transparent 55%, rgba(0,0,0,.45)); }
.step-num-badge { position: absolute; bottom: 10px; left: 12px; width: 26px; height: 26px; border-radius: 50%; background: var(--green); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.step-content { padding: 12px 14px 14px; }
.step-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--green-mid); margin-bottom: 3px; }
.step-text { font-size: 13px; line-height: 1.65; color: var(--text); }

/* ── List body (shared) ───────────────────────────────────────── */
.list-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 16px calc(96px + env(safe-area-inset-bottom)); }

.meal-row { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: var(--r14); padding: 10px 12px; margin-bottom: 8px; cursor: pointer; border: 0.5px solid var(--border); }
.meal-row:active { opacity: .85; }
.meal-thumb { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; background: var(--card2); flex-shrink: 0; }
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.meal-del { background: none; border: none; padding: 8px; flex-shrink: 0; }
.meal-del svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.meal-del:active svg { stroke: var(--red); }

/* ── Shopping (week-based) ────────────────────────────────────── */
.shop-section { margin-bottom: 28px; }
.shop-sec-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.shop-toolbar { display: flex; gap: 8px; margin-bottom: 14px; }
.shop-btn { flex: 1; padding: 10px; border-radius: var(--r10); border: 0.5px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; font-weight: 500; }
.shop-btn-clear { background: var(--card2); color: var(--text2); }
.ing-card { cursor: pointer; transition: opacity .2s; }
.ing-card.shared { border-color: #F59E0B; border-width: 2px; }
.ing-card.done { opacity: .35; }
.ing-card-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); margin-top: 6px; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
.ing-card-check.checked { background: var(--green); border-color: var(--green); }
.ing-card-check svg { display: none; width: 9px; height: 9px; stroke: #fff; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
.ing-card-check.checked svg { display: block; }
.hide-checked-btn { padding: 7px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--card); color: var(--text2); font-size: 12px; font-weight: 600; transition: all .15s; }
.hide-checked-btn.active { background: var(--green-bg); color: var(--green-mid); border-color: var(--green-light); }
.shop-toggle-row { display: flex; align-items: center; justify-content: flex-end; padding: 10px 16px 4px; flex-shrink: 0; }

/* ── This Week screen ────────────────────────────────────────── */
#week-header { flex-shrink: 0; background: var(--card); border-bottom: 0.5px solid var(--border); }
.week-nav-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(14px + env(safe-area-inset-top)) 16px 10px;
  gap: 8px;
}
.week-nav-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 0.5px solid var(--border);
  background: var(--bg); display: flex; align-items: center; justify-content: center;
  color: var(--text2); flex-shrink: 0; transition: background .15s;
}
.week-nav-btn:active { background: var(--card2); }
.week-nav-btn:disabled { opacity: .3; cursor: default; }
.week-nav-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.week-center { flex: 1; text-align: center; }
.week-label { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.2; }
.week-sublabel { font-size: 12px; color: var(--text2); margin-top: 1px; }
.week-fab {
  position: fixed;
  bottom: calc(84px + env(safe-area-inset-bottom));
  right: max(20px, calc(50vw - 215px + 20px));
  width: 54px; height: 54px; border-radius: 50%; border: none;
  background: var(--green); display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(45,106,79,.45), 0 2px 6px rgba(0,0,0,.18);
  z-index: 10; transition: opacity .2s, transform .2s;
}
.week-fab:active { transform: scale(.93); }
.week-fab svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.week-fab[hidden] { display: none; }
.week-mode-row { display: flex; gap: 0; padding: 0 16px 12px; }
.week-mode-btn {
  flex: 1; padding: 8px 0; border: 0.5px solid var(--border); background: var(--bg);
  color: var(--text2); font-size: 13px; font-weight: 600; transition: all .15s;
}
.week-mode-btn:first-child { border-radius: var(--r10) 0 0 var(--r10); border-right: none; }
.week-mode-btn:last-child  { border-radius: 0 var(--r10) var(--r10) 0; }
.week-mode-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

.reuse-banner {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--green-bg); border: 0.5px solid var(--green-light);
  border-radius: var(--r14); padding: 10px 14px; margin: 0 16px 10px; flex-shrink: 0;
}
.reuse-banner-text { font-size: 13px; color: var(--green-mid); font-weight: 500; }
.reuse-banner-btn {
  padding: 6px 14px; border-radius: 20px; border: none;

<script>
'use strict';

const STEP_LABELS = ['Prep','Cook','Simmer','Combine','Season','Finish','Rest','Serve'];

/* ── State ────────────────────────────────────────────────────── */
let allRecipes = [], queue = [], qIdx = 0, isLoading = false;
let savedList  = load('cb_saved', []);
let shopItems  = load('cb_shop',  []);   // kept for backwards compat, not used for week shop
let currentDetailId = null;
let searchActive = false, searchTimeout = null;
let browseMode = localStorage.getItem('cb_browse_mode') || 'swipe';
let useMetric  = localStorage.getItem('cb_units') === 'metric';
let currentQ   = '';

// v3 state
let viewingWeekKey = '';
let weekMode = 'plan';
let hideChecked = false;
let currentTab = 'recipes';
let pickerSearchVal = '';

/* ── Week helpers ─────────────────────────────────────────────── */
function isoWeekKey(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

function currentWeekKey() {
  return isoWeekKey(new Date());
}

function weekKeyOffset(key, delta) {
  const start = weekKeyStart(key);
  start.setDate(start.getDate() + delta * 7);
  return isoWeekKey(start);
}

function weekKeyStart(key) {
  // key = 'YYYY-Www'
  const [year, wStr] = key.split('-W');
  const y = parseInt(year, 10), w = parseInt(wStr, 10);
  // Jan 4 is always in week 1
  const jan4 = new Date(Date.UTC(y, 0, 4));
  const day4 = jan4.getUTCDay() || 7;
  const week1Monday = new Date(jan4);
  week1Monday.setUTCDate(jan4.getUTCDate() - day4 + 1);
  const monday = new Date(week1Monday);
  monday.setUTCDate(week1Monday.getUTCDate() + (w - 1) * 7);
  return new Date(monday.getUTCFullYear(), monday.getUTCMonth(), monday.getUTCDate());
}

function weekLabel(key) {
  const cwk = currentWeekKey();
  if (key === cwk) return 'This Week';
  if (key === weekKeyOffset(cwk, 1)) return 'Next Week';
  if (key < cwk) return 'Week of';
  return 'Week of';
}

function weekRange(key) {
  const start = weekKeyStart(key);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  const mo = (d) => d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  return `${mo(start)} – ${end.getDate()}`;
}

function isPastWeek(key) {
  return key < currentWeekKey();
}

function getWeekPlan(key) {
  return load(`cb_week_${key}`, []);
}

function saveWeekPlan(key, plan) {
  try { localStorage.setItem(`cb_week_${key}`, JSON.stringify(plan)); } catch(_) {}
}

function getShopChecked(key) {
  return load(`cb_shopchecked_${key}`, {});
}

function saveShopChecked(key, obj) {
  try { localStorage.setItem(`cb_shopchecked_${key}`, JSON.stringify(obj)); } catch(_) {}
}

function isInWeek(id, key) {
  return getWeekPlan(key).some(r => r.id === id);
}

function addToWeek(recipe) {
  const key = currentWeekKey();
  const plan = getWeekPlan(key);
  if (!plan.find(r => r.id === recipe.id)) {
    plan.push({ id: recipe.id, name: recipe.name, image: recipe.imageThumb || recipe.image || '', cuisine: recipe.cuisine || '' });
    saveWeekPlan(key, plan);
  }
}

function removeFromWeek(id, key) {
  const plan = getWeekPlan(key).filter(r => r.id !== id);
  saveWeekPlan(key, plan);
}

/* ── Unit conversion ──────────────────────────────────────────── */
const METRIC = {
  'oz':{'f':28.35,'u':'g'},'ounce':{'f':28.35,'u':'g'},'ounces':{'f':28.35,'u':'g'},
  'fl oz':{'f':29.57,'u':'ml'},'fluid ounce':{'f':29.57,'u':'ml'},
  'cup':{'f':236.6,'u':'ml'},'cups':{'f':236.6,'u':'ml'},
  'tbsp':{'f':14.79,'u':'ml'},'tablespoon':{'f':14.79,'u':'ml'},'tablespoons':{'f':14.79,'u':'ml'},
  'tsp':{'f':4.93,'u':'ml'},'teaspoon':{'f':4.93,'u':'ml'},'teaspoons':{'f':4.93,'u':'ml'},
  'lb':{'f':453.6,'u':'g'},'pound':{'f':453.6,'u':'g'},'pounds':{'f':453.6,'u':'g'},
  'quart':{'f':946,'u':'ml'},'gallon':{'f':3785,'u':'ml'},
};

function fmtQty(amount, unit) {
  const a = String(amount||'').trim(), u = String(unit||'').trim();
  if (!useMetric || !a || !u) return `${a} ${u}`.trim();
  const conv = METRIC[u.toLowerCase()];
  if (!conv) return `${a} ${u}`.trim();
  const num = parseFloat(a); if (isNaN(num)) return `${a} ${u}`.trim();
  let val = num * conv.f, ou = conv.u;
  if (ou==='ml' && val>=1000) { val/=1000; ou='L'; }
  if (ou==='g'  && val>=1000) { val/=1000; ou='kg'; }
  const r = val>=100 ? Math.round(val) : val>=10 ? Math.round(val*10)/10 : Math.round(val*100)/100;
  return `${r} ${ou}`;
}

function toggleUnits() {
  useMetric = !useMetric;
  localStorage.setItem('cb_units', useMetric ? 'metric' : 'us');
  syncUnitsUI();
  if (document.getElementById('detail-screen').classList.contains('active')) openDetail(currentDetailId);
  if (currentTab === 'week' && weekMode === 'shop') renderWeekShop();
}

function setUnits(metric) {
  useMetric = metric;
  localStorage.setItem('cb_units', useMetric ? 'metric' : 'us');
  syncUnitsUI();

/* ── Browse mode ─────────────────────────────────────────────── */
function toggleBrowseMode() {

}

function setBrowseMode(mode) {

function applyBrowseMode() {

/* ── Theme ───────────────────────────────────────────────────── */
function applyTheme(t) {

  document.getElementById('seg-theme-moon').style.display = t === 'light' ? 'block' : 'none';
}
(function initTheme() { applyTheme(localStorage.getItem('cb_theme') || 'dark'); })();

/* ── Persistence ─────────────────────────────────────────────── */
function load(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } }
function persist() {
  try {
    localStorage.setItem('cb_saved', JSON.stringify(savedList));
    localStorage.setItem('cb_shop',  JSON.stringify(shopItems));
  } catch(_) {}
}

/* ── API ─────────────────────────────────────────────────────── */
async function fetchPage(q, page) {
  const params = new URLSearchParams({ page });
  if (q && q !== 'All') params.set('cuisine', q);
  const r = await fetch(`/api/recipes?${params}`);
  return r.json();
}
async function fetchDetail(id) { const r = await fetch(`/api/recipe/${id}`); return r.json(); }
async function fetchImg(imgUrl) { const r = await fetch(`/api/img?url=${encodeURIComponent(imgUrl)}`); const d = await r.json(); return d.dataUrl || ''; }

const imgCache = new Map();
async function getImg(url) {
  if (!url) return '';
  if (imgCache.has(url)) return imgCache.get(url);
  const d = await fetchImg(url).catch(() => '');
  if (d) imgCache.set(url, d);
  return d;
}

function shuffle(arr) { for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function setPill(loaded, total) {
  const pill = document.getElementById('count-pill');
  pill.textContent = loaded < total ? `${loaded} / ${total}` : `${loaded} recipes`;
}

async function loadCuisines() {
  try {
    const r = await fetch('/api/cuisines');
    const d = await r.json();
    const row = document.getElementById('filter-row');
    const pills = (d.cuisines||[]).map(c => `<span class="fpill" data-q="${c}" onclick="filterBy(this)">${c}</span>`).join('');
    row.innerHTML = `<span class="fpill active" data-q="" onclick="filterBy(this)">All</span>${pills}`;
  } catch(_) {}
}

/* ── Load recipes ─────────────────────────────────────────────── */
async function loadRecipes(q='') {
  if (isLoading) return;
  isLoading = true;
  allRecipes = []; queue = []; qIdx = 0;
  setStack('<div class="center-state"><div class="spinner"></div></div>');
  try {
    const first = await fetchPage(q, 0);
    const total = first.total || 0;
    allRecipes = first.items || [];
    shuffle(allRecipes);
    queue = [...allRecipes];
    qIdx = 0;
    setPill(allRecipes.length, total);
    if (browseMode==='scroll') renderScrollList(); else renderCards();
    isLoading = false;

    const pages = Math.ceil(total / 20);
    for (let p = 1; p < pages; p++) {
      const data = await fetchPage(q, p);
      const newItems = shuffle(data.items || []);
      allRecipes.push(...newItems);
      queue.push(...newItems);
      setPill(allRecipes.length, total);
      if (browseMode==='scroll') renderScrollList();
    }
    setPill(allRecipes.length, allRecipes.length);
  } catch(e) {
    setStack(`<div class="center-state">
      <p class="state-title">Could not connect</p>
      <p class="state-sub">Make sure the server is running.<br><code style="font-size:11px;background:var(--card2);padding:2px 6px;border-radius:4px">node server.js</code></p>
    </div>`);
    isLoading = false;
  }
}

            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
        </div>
        <div class="sov sov-save"><span class="sov-label">Save</span></div>
        <div class="sov sov-skip"><span class="sov-label">Skip</span></div>

/* ── Swipe ───────────────────────────────────────────────────── */
function attachSwipe(card, id) {
  let startX=0, startY=0, dx=0, dragging=false, moved=false;
  const ss = card.querySelector('.sov-save'), sk = card.querySelector('.sov-skip');
  const onStart = (x, y) => { startX=x; startY=y; dragging=true; moved=false; card.style.transition='none'; };
  const onMove  = (x, y) => {
    if (!dragging) return;
    const ddx=x-startX, ddy=y-startY;
    if (!moved && Math.abs(ddy) > Math.abs(ddx)+8) { dragging=false; return; }
    moved=true; dx=ddx;
    card.style.transform = `translateX(${dx}px) rotate(${dx*.03}deg)`;
    const p = Math.min(Math.abs(dx)/90, 1);
    ss.style.opacity = dx>20 ? p : 0; sk.style.opacity = dx<-20 ? p : 0;
  };
  const onEnd = (e) => {
    if (!dragging) return; dragging=false; card.style.transition='';
    if      (dx >  90) saveCard(id);
    else if (dx < -90) skipCard(id);
    else {
      card.style.transform=''; ss.style.opacity=0; sk.style.opacity=0;
      const tgt = e && (e.changedTouches ? e.changedTouches[0].target : e.target);
      if (!moved && tgt && !tgt.closest('button')) openDetail(id);
    }
    dx = 0;
  };
  card.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => { if (dragging) onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup',   onEnd);
  card.addEventListener('touchstart',  e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
  card.addEventListener('touchmove',   e => { if (dragging&&moved) e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  card.addEventListener('touchend',    onEnd, {passive:true});
}

function animOut(id, dir, cb) {
  const c = document.getElementById(`card-${id}`); if (!c) { cb(); return; }
  c.classList.add(dir==='r' ? 'swipe-out-r' : 'swipe-out-l'); setTimeout(cb, 300);
}
function skipCard(id) { animOut(id, 'l', () => { qIdx++; renderCards(); }); }
function saveCard(id) {
  const r = queue[qIdx]; if (r && r.id===id && !savedList.find(x=>x.id===id)) { savedList.push(r); persist(); toast('Saved to collection'); }
  animOut(id, 'r', () => { qIdx++; renderCards(); });
}
function quickSave(id, btn) {
  const r = allRecipes.find(x => x.id===id); if (!r) return;
  const idx = savedList.findIndex(x => x.id===id);
  if (idx>=0) { savedList.splice(idx,1); btn.classList.remove('saved'); toast('Removed from saved'); }
  else        { savedList.push(r); btn.classList.add('saved'); toast('Saved to collection'); }
  persist();
}

/* ── Detail ──────────────────────────────────────────────────── */
async function openDetail(id) {
  currentDetailId = id;
  history.pushState(null, '', `#recipe/${id}`);
  const ds = document.getElementById('detail-screen');
  ds.classList.add('active');
  const cached = allRecipes.find(x=>x.id===id) || savedList.find(x=>x.id===id);
  document.getElementById('detail-img').src = cached ? (cached.image||cached.imageThumb||'') : '';
  updateFavBtn(!!savedList.find(x=>x.id===id));
  document.getElementById('detail-scroll').innerHTML = '<div class="center-state"><div class="spinner"></div></div>';

  const r = await fetchDetail(id).catch(() => null);
  if (!r || r.error) { document.getElementById('detail-scroll').innerHTML = '<p style="padding:20px;color:var(--text2)">Could not load recipe.</p>'; return; }
  document.getElementById('detail-img').src = r.image || '';
  let rec = allRecipes.find(x => x.id===id);
  if (!rec) { allRecipes.push(r); } else { Object.assign(rec, r); }

  const cwk = currentWeekKey();
  const inWeek = isInWeek(id, cwk);

  const nutrHtml = r.nutrition && r.nutrition.length
    ? `<p class="sec-hd">Nutrition per serving</p><div class="nutrition-row">${r.nutrition.map(n=>`<div class="nutr-chip"><div class="nutr-val">${n.amount}${n.unit}</div><div class="nutr-name">${n.name}</div></div>`).join('')}</div>` : '';

  const ingHtml = (r.ingredients||[]).map(ing => `
    <div class="ing-card">
      <img src="${ing.image||''}" alt="${ing.name}" loading="lazy" onerror="this.style.opacity='.15'">
      <span class="ing-card-name">${ing.name}</span>
      <span class="ing-card-qty">${fmtQty(ing.amount, ing.unit)}</span>
    </div>`).join('');

  const stepHtml = (r.steps||[]).map((s, i) => `
    <div class="step-card">
      <div class="step-img" id="simg-${id}-${i}"><div class="spinner"></div></div>
      <div class="step-content">
        <div class="step-label">${STEP_LABELS[i]||'Step '+(i+1)}</div>
        <div class="step-text">${s.instructions}</div>
      </div>
    </div>`).join('');

  const ytBtn = r.youtubeLink
    ? `<a class="yt-btn" href="${r.youtubeLink}" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon fill="white" points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>
        Watch on YouTube
       </a>` : '';

  document.getElementById('detail-scroll').innerHTML = `
    <div class="fade-in" style="padding-top:10px">
      <p class="detail-title">${r.name}</p>
      ${r.headline ? `<p class="detail-headline">${r.headline}</p>` : ''}
      <div class="detail-pills">
        ${r.cuisine   ? `<span class="detail-pill green">${r.cuisine}</span>`      : ''}
        ${r.difficulty? `<span class="detail-pill">${r.difficulty}</span>`          : ''}
        ${r.servings  ? `<span class="detail-pill">${r.servings} servings</span>`  : ''}
        ${r.rating    ? `<span class="detail-pill">${r.rating} rating</span>`      : ''}
      </div>
      <div class="detail-actions">
        <button class="d-btn d-btn-week${inWeek?' in-week':''}" id="detail-week-btn" onclick="toggleDetailWeek('${r.id}')">
          ${inWeek ? '✓ In This Week' : 'Add to This Week'}
        </button>
      </div>
      ${r.description ? `<p class="detail-desc">${r.description}</p>` : ''}
      ${ytBtn}
      ${nutrHtml}
      ${r.allergens&&r.allergens.length ? `<p class="sec-hd">Allergens</p><div class="allergen-row">${r.allergens.map(a=>`<span class="allergen-chip">${a}</span>`).join('')}</div>` : ''}
      ${ingHtml ? `<p class="sec-hd">Ingredients</p><div class="ing-grid">${ingHtml}</div>` : ''}
      ${stepHtml ? `<p class="sec-hd">How to cook</p><div class="steps-list">${stepHtml}</div>` : ''}
    </div>`;

  // Load step images
  (r.steps||[]).forEach((s, i) => {
    const wrap = document.getElementById(`simg-${id}-${i}`); if (!wrap) return;
    const src = s.image || r.image || '';
    if (!src) { wrap.style.display='none'; return; }
    getImg(src).then(dataUrl => {
      if (!wrap.isConnected) return;
      wrap.innerHTML = `<img src="${dataUrl||src}" alt="Step ${i+1}"><div class="step-img-overlay"></div><div class="step-num-badge">${i+1}</div>`;
    });
  });

  // Load ingredient images
  (r.ingredients||[]).forEach((ing, i) => {
    if (!ing.image) return;
    const el = document.querySelectorAll('.ing-card img')[i]; if (!el) return;
    getImg(ing.image).then(d => { if (d && el.isConnected) el.src = d; });
  });
}

function toggleDetailWeek(id) {
  const cwk = currentWeekKey();
  const r = allRecipes.find(x => x.id===id) || savedList.find(x => x.id===id);
  if (!r) return;
  const inWeek = isInWeek(id, cwk);
  if (inWeek) {
    removeFromWeek(id, cwk);
    const btn = document.getElementById('detail-week-btn');
    if (btn) { btn.textContent = 'Add to This Week'; btn.classList.remove('in-week'); }
    toast('Removed from This Week');
  } else {
    addToWeek(r);
    const btn = document.getElementById('detail-week-btn');
    if (btn) { btn.textContent = '✓ In This Week'; btn.classList.add('in-week'); }
    toast('Added to This Week');
  }
  if (currentTab === 'week') renderWeekTab();
}

function updateFavBtn(isSaved) {
  const btn = document.getElementById('detail-fav');
  btn.className = 'detail-fav' + (isSaved ? ' saved' : '');
}

function closeDetail() {
  history.back();
}

function toggleSaveFromDetail() {
  const id = currentDetailId; if (!id) return;
  const r = allRecipes.find(x=>x.id===id) || savedList.find(x=>x.id===id); if (!r) return;
  const idx = savedList.findIndex(x => x.id===id);
  if (idx>=0) { savedList.splice(idx,1); updateFavBtn(false); toast('Removed from saved'); }
  else        { savedList.push(r); updateFavBtn(true); toast('Saved to collection'); }
  persist();
  if (currentTab === 'me') renderSaved();
}

/* ── Saved (Me tab) ──────────────────────────────────────────── */
function renderSaved() {

  el.innerHTML = savedList.map((r, i) => mealRow(r, `removeSaved(${i})`)).join('');

function removeSaved(i) { savedList.splice(i, 1); persist(); renderSaved(); }

function mealRow(r, delFn) {

/* ── This Week tab ───────────────────────────────────────────── */
function renderWeekHeader() {
  const cwk = currentWeekKey();
  const past = isPastWeek(viewingWeekKey);
  const isCurrentWeek = viewingWeekKey === cwk;
  const maxFuture = weekKeyOffset(cwk, 2);

  document.getElementById('week-label-text').textContent = weekLabel(viewingWeekKey);
  document.getElementById('week-range-text').textContent = weekRange(viewingWeekKey);
  document.getElementById('week-prev-btn').disabled = false;
  document.getElementById('week-next-btn').disabled = viewingWeekKey >= maxFuture;
  // FAB: show only for current/future weeks in plan mode
  const fab = document.getElementById('week-fab');
  fab.style.display = (!past && weekMode === 'plan') ? 'flex' : 'none';
  // Make week center tappable only when not on current week
  document.getElementById('week-center').style.cursor = isCurrentWeek ? 'default' : 'pointer';
}

function jumpToThisWeek() {
  viewingWeekKey = currentWeekKey();
  renderWeekTab();
}

function renderWeekTab() {
  renderWeekHeader();
  if (weekMode === 'plan') {
    document.getElementById('week-plan-view').style.display = 'flex';
    document.getElementById('week-shop-view').style.display = 'none';
    renderWeekPlan();
  } else {
    document.getElementById('week-plan-view').style.display = 'none';
    document.getElementById('week-shop-view').style.display = 'flex';
    renderWeekShop();
  }
}

function setWeekMode(mode) {
  weekMode = mode;
  document.getElementById('week-mode-plan').classList.toggle('active', mode==='plan');
  document.getElementById('week-mode-shop').classList.toggle('active', mode==='shop');
  renderWeekTab();
}

function changeWeek(delta) {
  viewingWeekKey = weekKeyOffset(viewingWeekKey, delta);
  renderWeekTab();
}

function renderWeekPlan() {
  const plan = getWeekPlan(viewingWeekKey);
  const past = isPastWeek(viewingWeekKey);
  const cwk  = currentWeekKey();

  // Reuse banner for past weeks with meals
  const banner = document.getElementById('week-reuse-banner');
  banner.style.display = (past && plan.length > 0) ? 'flex' : 'none';

  const el = document.getElementById('week-plan-body');
  if (!plan.length) {
    el.innerHTML = empty('No meals planned', past ? 'No meals were planned this week.' : 'Tap ➕ to add meals to your plan.');
    return;
  }

  el.innerHTML = plan.map((r, i) => `
    <div class="meal-row" onclick="openDetail('${r.id}')">
      <img class="meal-thumb" src="${r.image||''}" alt="${r.name}" onerror="this.style.display='none'">
      <div class="meal-info">
        <p class="meal-name">${r.name}</p>
        <p class="meal-sub">${r.cuisine||''}</p>
      </div>
      <button class="meal-del" onclick="event.stopPropagation();removeWeekMeal('${r.id}')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');
}

function removeWeekMeal(id) {
  removeFromWeek(id, viewingWeekKey);
  renderWeekTab();
}

function reusePastWeek() {
  const plan = getWeekPlan(viewingWeekKey);
  const cwk  = currentWeekKey();
  const current = getWeekPlan(cwk);
  let added = 0;
  plan.forEach(r => {
    if (!current.find(x => x.id===r.id)) { current.push(r); added++; }
  });
  saveWeekPlan(cwk, current);
  toast(`${added} meal${added!==1?'s':''} added to This Week`);
}

async function renderWeekShop() {
  const el = document.getElementById('week-shop-body');
  const past = isPastWeek(viewingWeekKey);

  if (past) {
    el.innerHTML = '<div class="center-state"><p class="state-title">Past weeks are read-only</p><p class="state-sub">You can still view what was planned.</p></div>';
    return;
  }

  const plan = getWeekPlan(viewingWeekKey);
  if (!plan.length) {
    el.innerHTML = empty('No meals in plan', 'Add meals to your plan first.');
    return;
  }

  el.innerHTML = '<div class="center-state"><div class="spinner"></div></div>';

  const checked = getShopChecked(viewingWeekKey);

  // Collect all ingredients across plan recipes
  const allIngs = []; // [{recipeId, recipeName, recipeObj, ing}]
  for (const planItem of plan) {
    let rec = allRecipes.find(x => x.id===planItem.id);
    if (!rec || !rec.ingredients) {
      const detail = await fetchDetail(planItem.id).catch(() => null);
      if (detail && !detail.error) {
        if (rec) Object.assign(rec, detail);
        else { allRecipes.push(detail); rec = detail; }
      }
    }
    if (rec && rec.ingredients) {
      rec.ingredients.forEach(ing => {
        allIngs.push({ recipeId: planItem.id, recipeName: planItem.name, rec, ing });
      });
    }
  }

  // Shared ingredient detection
  const nameCounts = {};
  allIngs.forEach(x => { const k = x.ing.name.toLowerCase(); nameCounts[k] = (nameCounts[k]||0) + 1; });
  const sharedNames = new Set(Object.keys(nameCounts).filter(k => nameCounts[k] > 1));

  el.innerHTML = '';

  // Group by recipe
  const byRecipe = {};
  allIngs.forEach(x => { (byRecipe[x.recipeId] = byRecipe[x.recipeId] || { name: x.recipeName, rec: x.rec, ings: [] }).ings.push(x.ing); });

  for (const [recipeId, group] of Object.entries(byRecipe)) {
    const section = document.createElement('div');
    section.className = 'shop-section';

    const ingsHtml = group.ings.map(ing => {
      const ck = `${recipeId}___${ing.name}`;
      const isDone = !!checked[ck];
      if (hideChecked && isDone) return '';
      const isShared = sharedNames.has(ing.name.toLowerCase());
      return `<div class="ing-card${isShared?' shared':''}${isDone?' done':''}" onclick="toggleWeekShopItem('${recipeId}','${ing.name.replace(/'/g,"\\'")}')">
        ${ing.image ? `<img src="${ing.image}" alt="${ing.name}" loading="lazy" onerror="this.style.opacity='.15'">` : '<div style="width:52px;height:52px;background:var(--card2);border-radius:8px;margin-bottom:6px"></div>'}
        <span class="ing-card-name">${ing.name}</span>
        <span class="ing-card-qty">${fmtQty(ing.amount, ing.unit)}</span>
        <div class="ing-card-check${isDone?' checked':''}"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      </div>`;
    }).join('');

    section.innerHTML = `
      <div class="shop-sec-title" style="cursor:pointer" onclick="openDetail('${recipeId}')">
        ${group.name} <span style="font-size:10px;opacity:.5">↗</span>
      </div>
      <div class="ing-grid">${ingsHtml}</div>`;
    el.appendChild(section);
  }

  // Load ingredient images
  allIngs.forEach(({ ing }) => {
    if (!ing.image) return;
    document.querySelectorAll('.ing-card img').forEach(img => {
      if (img.alt === ing.name && !img.dataset.loaded) {
        img.dataset.loaded = '1';
        getImg(ing.image).then(d => { if (d && img.isConnected) img.src = d; });
      }
    });
  });
}

function toggleWeekShopItem(recipeId, ingName) {
  const key = viewingWeekKey;
  const checked = getShopChecked(key);
  const ck = `${recipeId}___${ingName}`;
  if (checked[ck]) delete checked[ck]; else checked[ck] = true;
  saveShopChecked(key, checked);
  renderWeekShop();
}

function toggleHideChecked() {
  hideChecked = !hideChecked;
  document.getElementById('hide-checked-btn').classList.toggle('active', hideChecked);
  renderWeekShop();
}

/* ── Recipe Picker ───────────────────────────────────────────── */
function openPicker() {
  const cwk = currentWeekKey();
  const lbl = viewingWeekKey === cwk ? 'This Week' : 'Next Week';
  document.getElementById('picker-title').textContent = `Add to ${lbl}`;
  document.getElementById('picker-search').value = '';
  pickerSearchVal = '';
  document.getElementById('picker-backdrop').classList.add('open');
  document.getElementById('picker-sheet').classList.add('open');
  renderPickerList();
  setTimeout(() => document.getElementById('picker-search').focus(), 350);
}

function closePicker() {
  document.getElementById('picker-backdrop').classList.remove('open');
  document.getElementById('picker-sheet').classList.remove('open');
}

function onPickerSearch(val) {
  pickerSearchVal = val;
  renderPickerList();
}

function filterPickerRecipes(q) {
  const lq = (q||'').toLowerCase();
  const terms = lq.split(/\s+/).filter(Boolean);
  if (!terms.length) return allRecipes;
  return allRecipes.filter(r => {
    const haystack = [
      r.name||'',
      r.cuisine||'',
      ...(r.tags||[]),
      ...(r.ingredients||[]).map(i => i.name||''),
    ].join(' ').toLowerCase();
    return terms.every(t => haystack.includes(t));
  });
}

function renderPickerList() {
  const list = document.getElementById('picker-list');
  const filtered = filterPickerRecipes(pickerSearchVal);
  if (!filtered.length) {
    list.innerHTML = empty('No recipes found', 'Try a different search.');
    return;
  }
  list.innerHTML = filtered.map(r => {
    const inWeek = isInWeek(r.id, viewingWeekKey);
    return `<div class="picker-item${inWeek?' in-week':''}" onclick="togglePickerItem('${r.id}')">
      <img class="picker-item-img" src="${r.imageThumb||r.image||''}" alt="${r.name}" loading="lazy">
      <div class="picker-item-info">
        <p class="picker-item-name">${r.name}</p>
        <p class="picker-item-meta">${r.cuisine||''}</p>
      </div>
      <div class="picker-check">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>`;
  }).join('');
}

function togglePickerItem(id) {
  const inWeek = isInWeek(id, viewingWeekKey);
  const r = allRecipes.find(x => x.id===id);
  if (!r) return;
  if (inWeek) {
    removeFromWeek(id, viewingWeekKey);
    toast(`Removed from ${weekLabel(viewingWeekKey)}`);
  } else {
    addToWeek(r);
    toast(`Added to ${weekLabel(viewingWeekKey)}`);
  }
  renderPickerList();
  if (currentTab === 'week') renderWeekTab();
}

/* ── Filter ──────────────────────────────────────────────────── */
async function filterBy(el) {
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentQ = el.dataset.q || '';
  filterRecipes(currentQ);
}

/* ── Search ──────────────────────────────────────────────────── */
function toggleSearch() {
  const bar = document.getElementById('search-bar');
  searchActive = !searchActive;
  bar.style.display = searchActive ? 'block' : 'none';
  if (searchActive) document.getElementById('search-input').focus();
  else clearSearch();
}

function onSearch(val) {
  document.getElementById('search-clear').style.display = val ? 'block' : 'none';
  clearTimeout(searchTimeout);
  if (!val.trim()) { filterRecipes(currentQ); return; }
  searchTimeout = setTimeout(() => filterRecipes(val), 350);
}

function clearSearch() {
  const inp = document.getElementById('search-input'); if (inp) inp.value = '';
  document.getElementById('search-clear').style.display = 'none';
  filterRecipes(currentQ);
}

function filterRecipes(q) {
  const lq = (q||'').toLowerCase();
  const terms = lq.split(/\s+/).filter(Boolean);
  const base = terms.length && lq !== 'all'
    ? allRecipes.filter(r => {
        const haystack = [
          r.name||'',
          r.cuisine||'',
          ...(r.tags||[]),
          ...(r.ingredients||[]).map(i => i.name||''),
        ].join(' ').toLowerCase();
        return terms.every(t => haystack.includes(t));
      })
    : allRecipes;
  queue = [...base]; qIdx = 0;
  document.getElementById('count-pill').textContent = `${base.length} recipes`;
  if (browseMode==='scroll') renderScrollList(); else renderCards();
}

/* ── Navigation ──────────────────────────────────────────────── */
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.nav-btn').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById(`tab-${name}`); if (tabEl) tabEl.classList.add('active');
  document.querySelectorAll('.screen:not(#detail-screen)').forEach(s => s.classList.remove('active'));
  document.getElementById(`${name}-screen`).classList.add('active');
  history.replaceState(null, '', `#${name}`);
  if (name === 'week') renderWeekTab();
  if (name === 'me')   renderSaved();
}

/* ── Hash / URL routing ──────────────────────────────────────── */
function handleHashChange() {
  const hash = window.location.hash;
  if (hash.startsWith('#recipe/')) {
    const id = hash.slice(8);
    if (id && id !== currentDetailId) {
      // Open detail without pushing state again (popstate already happened)
      currentDetailId = id;
      const ds = document.getElementById('detail-screen');
      ds.classList.add('active');
      const cached = allRecipes.find(x=>x.id===id) || savedList.find(x=>x.id===id);
      document.getElementById('detail-img').src = cached ? (cached.image||cached.imageThumb||'') : '';
      updateFavBtn(!!savedList.find(x=>x.id===id));
      document.getElementById('detail-scroll').innerHTML = '<div class="center-state"><div class="spinner"></div></div>';
      fetchDetail(id).then(r => {
        if (!r || r.error) { document.getElementById('detail-scroll').innerHTML = '<p style="padding:20px;color:var(--text2)">Could not load recipe.</p>'; return; }
        document.getElementById('detail-img').src = r.image || '';
        let rec = allRecipes.find(x=>x.id===id);
        if (!rec) { allRecipes.push(r); } else { Object.assign(rec, r); }
        const cwk = currentWeekKey();
        const inWeek = isInWeek(id, cwk);
        const nutrHtml = r.nutrition&&r.nutrition.length ? `<p class="sec-hd">Nutrition per serving</p><div class="nutrition-row">${r.nutrition.map(n=>`<div class="nutr-chip"><div class="nutr-val">${n.amount}${n.unit}</div><div class="nutr-name">${n.name}</div></div>`).join('')}</div>` : '';
        const ingHtml = (r.ingredients||[]).map(ing=>`<div class="ing-card"><img src="${ing.image||''}" alt="${ing.name}" loading="lazy" onerror="this.style.opacity='.15'"><span class="ing-card-name">${ing.name}</span><span class="ing-card-qty">${fmtQty(ing.amount,ing.unit)}</span></div>`).join('');
        const stepHtml = (r.steps||[]).map((s,i)=>`<div class="step-card"><div class="step-img" id="simg-${id}-${i}"><div class="spinner"></div></div><div class="step-content"><div class="step-label">${STEP_LABELS[i]||'Step '+(i+1)}</div><div class="step-text">${s.instructions}</div></div></div>`).join('');
        const ytBtn = r.youtubeLink ? `<a class="yt-btn" href="${r.youtubeLink}" target="_blank"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.96-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon fill="white" points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg>Watch on YouTube</a>` : '';
        document.getElementById('detail-scroll').innerHTML = `<div class="fade-in" style="padding-top:10px"><p class="detail-title">${r.name}</p>${r.headline?`<p class="detail-headline">${r.headline}</p>`:''}<div class="detail-pills">${r.cuisine?`<span class="detail-pill green">${r.cuisine}</span>`:''} ${r.difficulty?`<span class="detail-pill">${r.difficulty}</span>`:''} ${r.servings?`<span class="detail-pill">${r.servings} servings</span>`:''} ${r.rating?`<span class="detail-pill">${r.rating} rating</span>`:''}</div><div class="detail-actions"><button class="d-btn d-btn-week${inWeek?' in-week':''}" id="detail-week-btn" onclick="toggleDetailWeek('${r.id}')">${inWeek?'✓ In This Week':'Add to This Week'}</button></div>${r.description?`<p class="detail-desc">${r.description}</p>`:''} ${ytBtn} ${nutrHtml} ${r.allergens&&r.allergens.length?`<p class="sec-hd">Allergens</p><div class="allergen-row">${r.allergens.map(a=>`<span class="allergen-chip">${a}</span>`).join('')}</div>`:''} ${ingHtml?`<p class="sec-hd">Ingredients</p><div class="ing-grid">${ingHtml}</div>`:''} ${stepHtml?`<p class="sec-hd">How to cook</p><div class="steps-list">${stepHtml}</div>`:''}</div>`;
        (r.steps||[]).forEach((s,i)=>{ const wrap=document.getElementById(`simg-${id}-${i}`); if(!wrap)return; const src=s.image||r.image||''; if(!src){wrap.style.display='none';return;} getImg(src).then(dataUrl=>{ if(!wrap.isConnected)return; wrap.innerHTML=`<img src="${dataUrl||src}" alt="Step ${i+1}"><div class="step-img-overlay"></div><div class="step-num-badge">${i+1}</div>`; }); });
        (r.ingredients||[]).forEach((ing,i)=>{ if(!ing.image)return; const el=document.querySelectorAll('.ing-card img')[i]; if(!el)return; getImg(ing.image).then(d=>{ if(d&&el.isConnected)el.src=d; }); });
      }).catch(()=>{});
    }
  } else {
    // Close detail if open
    const ds = document.getElementById('detail-screen');
    if (ds.classList.contains('active')) {
      ds.classList.remove('active');
      currentDetailId = null;
    }
    // Set tab from hash
    const tabFromHash = hash.replace('#','');
    const validTabs = ['recipes','week','me'];
    if (validTabs.includes(tabFromHash) && tabFromHash !== currentTab) {
      switchTab(tabFromHash);
    }
  }
}

window.addEventListener('popstate', handleHashChange);

/* ── Toast ───────────────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

function empty(title, sub) {
  return `<div class="center-state"><p class="state-title">${title}</p><p class="state-sub">${sub}</p></div>`;
}

/* ── Init ────────────────────────────────────────────────────── */
(function init() {
  // Set initial week state
  viewingWeekKey = currentWeekKey();

  // Restore unit btn
  syncUnitsUI();

  // Restore browse mode
  applyBrowseMode();

  // Load cuisines + recipes
  loadCuisines();
  loadRecipes('');

  // Handle initial hash
  handleHashChange();
})();
</script>
